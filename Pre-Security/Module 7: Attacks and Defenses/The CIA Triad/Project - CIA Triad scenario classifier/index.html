<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIA Triad Scenario Classifier</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>CIA Triad Scenario Classifier</h1>
      <p id="scenario">Click "New Scenario" to begin.</p>

      <div class="button-group">
        <button data-answer="Confidentiality">Confidentiality</button>
        <button data-answer="Integrity">Integrity</button>
        <button data-answer="Availability">Availability</button>
      </div>

      <p id="feedback">Choose the CIA Triad principle affected by the scenario.</p>

      <button id="newScenario">New Scenario</button>
      <p id="score">Score: 0 / 0</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
